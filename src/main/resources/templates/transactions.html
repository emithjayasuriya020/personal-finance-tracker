<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/transactionstyles.css">
    <title>Transactions</title>
</head>
<body>
<div class="container">
    <h1>Transaction History</h1>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Description</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="transaction : ${transactions}">
            <td th:text="${transaction.id}"></td>
            <td th:text="${transaction.description}"></td>
            <td th:text="${transaction.amount}"></td>
            <td th:text="${transaction.transactionDate}"></td>
            <td>
                <a th:href="@{'/transactions/edit/' + ${transaction.id}}" class="action-link">Edit</a>
                <a th:href="@{'/transactions/delete/' + ${transaction.id}}" class="action-link delete" onclick="return confirm('Are you sure?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
    <div class="btn-group">
        <a href="/transactions/new" class="btn">Add New Transaction</a>
        <a href="/dashboard" class="btn">Dashboard</a>
    </div>
</div>
</body>
</html>
