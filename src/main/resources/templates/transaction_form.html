<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/transaction_styles.css">
    <title>Transaction Form</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<nav class="navbar">
    <ul>
        <li><a href="/home" class="active">New Transaction</a></li>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/transactions">Transactions</a></li>
    </ul>
</nav>

<div class="container">
    <h1 th:text="${transaction.id != null} ? 'Edit Transaction' : 'New Transaction'"></h1>

    <form th:action="@{/transactions/save}" th:object="${transaction}" method="post">
        <div class="form-group">
            <label for="description">Description</label>
            <input type="text" id="description" th:field="*{description}" required>
        </div>

        <div class="form-group">
            <label for="amount">Amount</label>
            <input type="number" id="amount" th:field="*{amount}" required>
        </div>

        <div class="form-group">
            <label for="transactionDate">Transaction Date</label>
            <input type="datetime-local" id="transactionDate" th:field="*{transactionDate}" required>
        </div>

        <div class="form-group">
            <label for="type">Type</label>
            <select id="type" th:field="*{type}" required>
                <option value="" disabled selected>Select Transaction Type</option>
                <option value="INCOME">Income</option>
                <option value="EXPENSE">Expense</option>
            </select>
        </div>

        <!-- Category Dropdown -->
        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" th:field="*{category.id}" required>
                <option value="" disabled selected>Select Category</option>
            </select>
        </div>

        <div class="form-buttons">
            <button type="submit" class="btn">Save</button>
            <a href="/transactions" class="back-btn">Back to List</a>
        </div>
    </form>
</div>

<script>
    $(document).ready(function () {
        // When the transaction type changes, fetch the corresponding categories
        $('#type').on('change', function () {
            var type = $(this).val();
            if (type) {
                $.ajax({
                    url: '/transactions/categories',
                    type: 'GET',
                    data: {type: type},
                    success: function (categories) {
                        $('#category').empty();
                        $('#category').append('<option value="" disabled selected>Select Category</option>');
                        $.each(categories, function (key, category) {
                            $('#category').append('<option value="' + category.id + '">' + category.name + '</option>');
                        });
                    }
                });
            }
        });
    });
</script>
</body>
</html>
