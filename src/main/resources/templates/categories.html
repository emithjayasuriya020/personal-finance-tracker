<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Categories</title>
    <link rel="stylesheet" href="/custom-styles.css">
</head>
<body>
<div class="container">
    <nav>
        <ul>
            <li><a href="/dashboard">Home</a></li>
            <li><a href="/categories" class="active">Categories</a></li>
        </ul>
    </nav>

    <h1>Manage Categories</h1>

    <!-- Form for adding or editing a category -->
    <div class="add-category">
        <button onclick="showCategoryForm()">Add New Category</button>
        <div id="categoryForm" style="display:none;">
            <form th:action="@{/categories}" th:object="${category}" method="post">
                <input type="hidden" th:field="*{id}"/>

                <label for="name">Category Name:</label>
                <input type="text" id="name" th:field="*{name}" required/>

                <label for="type">Type:</label>
                <select id="type" th:field="*{type}">
                    <option th:value="INCOME">Income</option>
                    <option th:value="EXPENSE">Expense</option>
                </select>

                <button type="submit" th:text="${category.id != null ? 'Update Category' : 'Save Category'}"></button>
            </form>
        </div>
    </div>

    <!-- Table for displaying existing categories -->
    <table>
        <thead>
        <tr>
            <th>Category Name</th>
            <th>Category Type</th>
            <th>Edit</th>
            <th>Delete</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="category : ${categories}">
            <td th:text="${category.name}">Category Name</td>
            <td th:text="${category.type}">Category Type</td>
            <td><a href="#" th:href="@{'/categories/edit/' + ${category.id}}" onclick="showCategoryForm()">Edit</a></td>
            <td>
                <!-- Delete button with simple form submission -->
                <form th:action="@{/categories/{id}(id=${category.id})}" method="post" onsubmit="return confirm('Are you sure you want to delete this category?');">
                    <input type="hidden" name="_method" value="delete"/>
                    <button type="submit">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    function showCategoryForm() {
        document.getElementById('categoryForm').style.display = 'block';
    }
</script>
</body>
</html>
